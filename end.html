      font-weight: bold;
      color: #f00;

      user-select: none;
      pointer-events: none;

    body * {

      opacity: 0.8;
      white-space: pre-wrap;

      left: 50%;

    }

    .matrix-word {
  position: absolute;
  top: 0; 
  color: #f00;
  font-weight: bold;
  font-size: 22px;
  opacity: 0.85;
  user-select: none;
  white-space: nowrap;
  pointer-events: none;
  mix-blend-mode: screen;
  filter: drop-shadow(0 0 2px red);
  text-shadow: 0 0 5px red, 0 0 10px red;
  z-index: 2;

}
